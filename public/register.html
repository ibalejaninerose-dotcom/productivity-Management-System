<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gateway Loss System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        button:hover {
            background: #4338ca;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
        }
        
        .link a {
            color: #4f46e5;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Create Account</h1>
        <div class="subtitle">Register to Gateway Loss System</div>
        
        <input type="text" id="fullname" placeholder="Full Name">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <button onclick="register()">Register</button>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <div class="link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
    
    <script>
        function register() {
            const fullname = document.getElementById('fullname').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            document.getElementById('error').innerText = '';
            document.getElementById('success').innerText = '';
            
            if (!fullname || !username || !password) {
                document.getElementById('error').innerText = 'Please fill in all fields';
                return;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('error').innerText = 'Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                document.getElementById('error').innerText = 'Password must be at least 6 characters';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.find(u => u.username === username)) {
                document.getElementById('error').innerText = 'Username already exists';
                return;
            }
            
            users.push({ username: username, password: password, name: fullname });
            localStorage.setItem('users', JSON.stringify(users));
            
            document.getElementById('success').innerText = 'Registration successful! Redirecting to login...';
            
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
    </script>
</body>
</html>
